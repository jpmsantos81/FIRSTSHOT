

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#181818;
    color:white;
    font-family:Arial;

    display:flex;
    justify-content:center;
    padding:40px;
}

.modal {
    width:1200px;
    height:750px;

    display:grid;

    grid-template-columns:340px 190px 1fr;
    grid-template-rows:auto auto;

    gap:20px;
}

/* FOTO */

.agente{
    grid-row:1 / 3;

    position:relative;

    overflow:hidden;
}

.agente img{
    position:absolute;

    bottom:0;
    left:50%;

    height:120%;
    width:auto;

    transform:translateX(-50%);
}

/* INFO AGENTE */

.infoAgente{
    grid-column:2 / 4;

    background:#262626;

    border-radius:20px;

    padding:25px;
}

/* HABILIDADES */

.skills{

    display:grid;

    grid-template-columns:repeat(2,80px);

    gap:15px;

    justify-content:center;
    align-content:start;
}

.skills button{

    width:80px;
    height:80px;

    border:none;
    border-radius:16px;

    background:#444;

    color:white;

    font-size:22px;

    cursor:pointer;
}

/* INFO HABILIDADE */

.infoSkill{

    background:#262626;

    border-radius:20px;

    padding:25px;
}
</style>
